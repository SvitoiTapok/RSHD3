services:
  db1:
    container_name: db1
    image: postgres:15
    build:
      context: ./db1
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db1
    #      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./db1/data:/var/lib/postgresql
    networks:
      - pg_net

  db2:
    container_name: db2
    image: postgres:15
    build:
      context: ./db2
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db2
    #      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./db2/data:/var/lib/postgresql
    networks:
      - pg_net

  pgpool:
    image: pgpool/pgpool:latest
    ports:
      - "5432:5432"
    volumes:
      - ./pgpool/pgpool.conf:/config/pgpool.conf:ro
    environment:
      PGPOOL_CONF_VOLUME: /config
    depends_on:
      - db1
      - db2
    networks:
      - pg_net

networks:
  pg_net:
    driver: bridge