services:
  db1:
    container_name: db1
    image: postgres:15
    build:
      context: ./db1
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db1
#      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./db1/data:/var/lib/postgresql
    networks:
      - pg_net

  db2:
    container_name: db2
    image: postgres:15
    build:
      context: ./db2
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db2
#      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./db2/data:/var/lib/postgresql
    networks:
      - pg_net

  pgpool:
    image: pgpool/pgpool:latest
    ports:
      - "5432:5432"
    environment:
      PGPOOL_BACKEND_NODES: "0:db1:5432,1:db2:5432"
      PGPOOL_PARAMS_BACKEND_HOSTNAME0: db1
      PGPOOL_PARAMS_BACKEND_HOSTNAME1: db2
      PGPOOL_SR_CHECK_USER: postgres
      PGPOOL_SR_CHECK_PASSWORD: postgres
      PGPOOL_POSTGRES_USERNAME: postgres
      PGPOOL_POSTGRES_PASSWORD: postgres
      PGPOOL_ADMIN_USERNAME: admin
      PGPOOL_ADMIN_PASSWORD: adminpassword
    depends_on:
      - db1
      - db2
    networks:
      - pg_net

networks:
  pg_net:
    driver: bridge